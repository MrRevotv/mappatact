<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>C2 Tactical Command</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body class="layout-con-orbita" onload="startC2()">
    <div id="login-overlay">
        <h1 style="font-size: 1.8rem; margin-bottom: 5px; font-weight: 300; letter-spacing: 1px;">Centro di Comando Tattico</h1>
        <h2 style="color: #ff8c00; margin-top: 0; font-size: 2.5rem; text-transform: uppercase; font-weight: bold; letter-spacing: 3px; text-shadow: 0 0 15px rgba(255, 140, 0, 0.4);">
            Logistic Space Economy</h2>
        <a href="/auth/discord" class="btn-discord" style="margin-top: 30px;">Accedi con Discord</a>
    </div>

    <div id="banner-notifiche">Sistema Online.</div>

    <div id="sidebar-orbita">
        <button class="tab-btn tab-orbita" onclick="toggleOrbita()" title="Apri/Chiudi Orbita">👁️</button>
        <h3>In Orbita / Attesa</h3>
        <p style="font-size: 12px; color: #ccc;">Trascina qui le unità fuori mappa</p>
        <div id="orbita-container" class="dropzone" style="flex-grow: 1; border: 2px dashed #555; border-radius: 8px; padding: 10px; margin-top: 10px;"></div>
    </div>

    <div id="sidebar">
        <button class="tab-btn tab-roster" onclick="toggleRoster()" title="Apri/Chiudi Roster">👁️</button>
        <h2 style="color: #7289da; font-size: 13px; text-transform: uppercase;">Operatori Autorizzati</h2>
        <div id="lista-operatori"></div>
    </div>

    <div id="pannello">
        <button class="tab-btn tab-pannello" onclick="togglePannello()">👁️ Strumenti</button>
        
        <label>Set Operativo:</label>
        <select id="filtro-gioco" onchange="cambiaSetIcone()">
            <option value="sc">Star Citizen</option>
            <option value="arma">Arma</option>
            <option value="general">General (NATO)</option>
        </select>

        <select id="filtro-sistema" style="display: block; margin-top: 5px;">
            <option value="stanton">Stanton</option>
            <option value="pyro">Pyro</option>
            <option value="nyx">Nyx</option>
        </select>

        <select id="tendinaMappe" onchange="cambiaMappaPrincipale()" style="margin-top: 10px; width: 100%;"></select>

        <select id="tendinaDettagli" onchange="cambiaSottomappa()" style="margin-top: 5px; width: 100%;">
            <option value="">-- Carica Dettaglio / Sottomappa --</option>
        </select>

        <input type="file" id="fileMappaMaster" accept="image/*" style="display: none;" onchange="uploadMappa('master')">
        <input type="file" id="fileSottomappa" accept="image/*" style="display: none;" onchange="uploadMappa('submap')">

        <div style="margin-top: 5px; display: flex; gap: 5px; align-items: center;">
            <button onclick="document.getElementById('fileMappaMaster').click()" style="padding: 5px; flex: 1; background: #2f61a1;">⬆️ Nuova Mappa</button>
            <button id="btn-upload-sub" onclick="document.getElementById('fileSottomappa').click()" style="padding: 5px; flex: 1; background: #2f8141;">⬆️ Carica Dettaglio</button>
            <button onclick="eliminaMappaCorrente()" style="background: #aa4444; padding: 5px;">🗑️ Elimina</button>
        </div>

        <hr style="border-color: #444; width: 100%;">

        <div style="display: flex; flex-wrap: wrap; gap: 5px;">
            <button id="btn-matita" onclick="toggleMatita()">✏️ Matita</button>
            <button id="btn-gomma" onclick="toggleGomma()">🧽 Gomma</button>
            <button id="btn-testo" onclick="attivaTesto()">🔤 Testo</button>
            <button onclick="undoDisegno()">↩️ Annulla</button>
            <button onclick="pulisciDisegni()">🗑️ Pulisci Tutto</button>
        </div>

        <select id="colore-matita" onchange="cambiaColoreMatita()" style="margin-top: 5px;">
            <option value="#ff4444">Rosso</option>
            <option value="#44ff44">Verde</option>
            <option value="#4444ff">Blu</option>
            <option value="#ffff44">Giallo</option>
            <option value="#ffffff">Bianco</option>
        </select>

        <button id="btn-griglia" onclick="toggleGriglia()" style="margin-top: 10px;">Attiva Griglia Tattica</button>

        <div id="icone-container" style="margin-top: 15px; display: flex; flex-wrap: wrap; gap: 10px;"></div>

        <button onclick="salvaPreset()" style="margin-top: 15px; background: #28a745;">💾 Salva Preset</button>
        <button onclick="logout()" class="btn-logout" style="margin-top: 5px;">Esci</button>
    </div>

    <div id="map"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/icone_db.js"></script>
    <script src="js/tools.js"></script>
    <script src="script.js"></script>
</body>
</html>
